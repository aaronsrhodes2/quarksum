<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagatha's Gallery</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0f;
  color:#e0e0e0;
  font-family:'Courier New', monospace;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── Top bar ── */
#topbar {
  background:#111118;
  border-bottom:1px solid #2a2a35;
  flex-shrink:0;
  padding:8px 14px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
#topbar-row1 {
  display:flex;
  align-items:center;
  gap:10px;
}
#topbar h1 {
  font-size:14px;
  color:#c8a050;
  white-space:nowrap;
  letter-spacing:2px;
}
#prompt-input {
  flex:1;
  background:#0e0e18;
  border:1px solid #2a2a40;
  color:#e0e0e0;
  font-family:inherit;
  font-size:12px;
  padding:5px 10px;
  outline:none;
  border-radius:2px;
}
#prompt-input:focus { border-color:#c8a050; }
#prompt-input::placeholder { color:#444; }
#submit-btn {
  background:#1a1a28;
  border:1px solid #3a3a55;
  color:#c8a050;
  font-family:inherit;
  font-size:12px;
  padding:5px 14px;
  cursor:pointer;
  border-radius:2px;
  white-space:nowrap;
}
#submit-btn:hover { background:#252535; }
#submit-btn:disabled { color:#444; cursor:default; }

/* ── Status row ── */
#topbar-row2 {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.indicator {
  display:flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  color:#444;
  padding:2px 7px;
  border:1px solid #222;
  border-radius:10px;
  transition:color 0.3s, border-color 0.3s;
}
.indicator.active-net  { color:#4af; border-color:#4af4; }
.indicator.active-db   { color:#4f4; border-color:#4f44; }
.indicator.active-local{ color:#fa4; border-color:#fa44; }
.indicator .dot {
  width:6px; height:6px; border-radius:50%;
  background:currentColor;
  opacity:0.3;
  transition:opacity 0.3s;
}
.indicator.active-net .dot,
.indicator.active-db .dot,
.indicator.active-local .dot { opacity:1; }

.sys-stat {
  font-size:10px;
  color:#555;
  padding:2px 7px;
  border:1px solid #1a1a20;
  border-radius:10px;
}
.sys-stat span { color:#0cf; }
.sys-stat.warn span { color:#f84; }
.sys-stat.crit span { color:#f44; }

#status-msg {
  font-size:10px;
  color:#555;
  margin-left:auto;
  white-space:nowrap;
  max-width:340px;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ── Activity log ── */
#activity {
  background:#0c0c12;
  border-bottom:1px solid #2a2a35;
  flex-shrink:0;
  max-height:0;
  overflow:hidden;
  transition:max-height 0.25s ease;
}
#activity.open { max-height:220px; }
#activity-inner {
  display:flex;
  flex-direction:column;
  height:220px;
}
#activity-header {
  display:flex;
  align-items:center;
  gap:8px;
  padding:5px 14px;
  border-bottom:1px solid #1a1a22;
  flex-shrink:0;
}
#activity-title {
  font-size:10px;
  color:#888;
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#activity-status {
  font-size:10px;
  padding:1px 8px;
  border-radius:8px;
  border:1px solid #333;
  color:#666;
}
#activity-status.running { color:#4af; border-color:#4af4; }
#activity-status.done    { color:#4f4; border-color:#4f44; }
#activity-status.error   { color:#f44; border-color:#f444; }
#activity-close {
  background:none;border:none;color:#444;cursor:pointer;
  font-size:14px;padding:0 2px;line-height:1;
}
#activity-close:hover { color:#888; }
#activity-log {
  flex:1;
  overflow-y:auto;
  padding:6px 14px;
  font-size:10px;
  line-height:1.6;
  color:#555;
}
#activity-log::-webkit-scrollbar { width:3px; }
#activity-log::-webkit-scrollbar-thumb { background:#222; }
.log-line { white-space:pre-wrap; word-break:break-all; }
.log-line.nagatha { color:#c8a050; }
.log-line.error   { color:#f66; }
.log-line.gallery { color:#0cf; }
.log-line.done    { color:#4f4; }

/* ── Main area ── */
#main {
  display:flex;
  flex:1;
  min-height:0;
}

/* ── Viewer (iframe) ── */
#viewer-wrap {
  flex:1;
  position:relative;
  min-width:0;
  background:#0e0e14;
}
#viewer-frame {
  width:100%;
  height:100%;
  border:none;
  display:block;
}
#viewer-placeholder {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#333;
  font-size:13px;
  gap:10px;
  pointer-events:none;
}
#viewer-placeholder .big { font-size:40px; }

/* ── Inventory sidebar ── */
#sidebar {
  width:200px;
  min-width:200px;
  background:#0d0d14;
  border-left:1px solid #1a1a25;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
#sidebar-header {
  padding:8px 10px;
  font-size:10px;
  letter-spacing:1.5px;
  color:#555;
  text-transform:uppercase;
  border-bottom:1px solid #1a1a25;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
#sidebar-header span { color:#333; }
#render-all-btn {
  background:#111;
  border:1px solid #2a2a30;
  color:#888;
  font-size:9px;
  font-family:inherit;
  padding:2px 6px;
  cursor:pointer;
  border-radius:2px;
}
#render-all-btn:hover { color:#c8a050; border-color:#c8a050; }

#inventory-list {
  flex:1;
  overflow-y:auto;
  padding:4px 0;
}
#inventory-list::-webkit-scrollbar { width:4px; }
#inventory-list::-webkit-scrollbar-thumb { background:#222; }

.inv-item {
  display:flex;
  align-items:center;
  gap:7px;
  padding:5px 10px;
  cursor:pointer;
  border-left:2px solid transparent;
  transition:background 0.1s;
}
.inv-item:hover { background:#13131c; }
.inv-item.active { border-left-color:#c8a050; background:#14141e; }
.inv-thumb {
  width:36px;
  height:36px;
  object-fit:cover;
  border-radius:2px;
  background:#111;
  flex-shrink:0;
  border:1px solid #1e1e28;
}
.inv-info { min-width:0; }
.inv-name {
  font-size:10px;
  color:#bbb;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.inv-meta { font-size:9px; color:#444; margin-top:1px; }
.inv-item .view-badge {
  font-size:8px;
  color:#4af;
  margin-left:auto;
  white-space:nowrap;
  flex-shrink:0;
}

/* objects not yet rendered */
.obj-item {
  display:flex;
  align-items:center;
  gap:7px;
  padding:5px 10px;
  cursor:pointer;
  border-left:2px solid transparent;
  opacity:0.5;
  transition:opacity 0.1s;
}
.obj-item:hover { opacity:0.85; background:#13131c; }
.obj-dot {
  width:36px;
  height:36px;
  border-radius:2px;
  background:#111;
  border:1px solid #1a1a22;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
}

#library-section {
  border-top:1px solid #1a1a25;
  padding:6px 0;
}
#library-header {
  padding:4px 10px 6px;
  font-size:9px;
  letter-spacing:1px;
  color:#333;
  text-transform:uppercase;
}
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div id="topbar">
  <div id="topbar-row1">
    <h1>⚛ NAGATHA</h1>
    <input id="prompt-input" type="text"
           placeholder="Ask Nagatha to render something… e.g. 'a basketball on a concrete block'"
           onkeydown="if(event.key==='Enter')submitPrompt()">
    <button id="submit-btn" onclick="submitPrompt()">Submit</button>
  </div>
  <div id="topbar-row2">
    <div class="indicator" id="ind-net">
      <div class="dot"></div>🌐 Net
    </div>
    <div class="indicator" id="ind-db">
      <div class="dot"></div>📁 DB
    </div>
    <div class="indicator" id="ind-local">
      <div class="dot"></div>💚 Local
    </div>
    <div class="sys-stat" id="stat-cpu">CPU <span id="cpu-val">—</span></div>
    <div class="sys-stat" id="stat-ram">RAM <span id="ram-val">—</span></div>
    <div class="sys-stat" id="stat-disk">Disk <span id="disk-val">—</span></div>
    <div id="status-msg">Ready</div>
  </div>
</div>

<!-- ── ACTIVITY LOG ── -->
<div id="activity">
  <div id="activity-inner">
    <div id="activity-header">
      <span id="activity-title">Nagatha</span>
      <span id="activity-status">idle</span>
      <button id="activity-close" onclick="closeActivity()" title="Dismiss">✕</button>
    </div>
    <div id="activity-log"></div>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="main">

  <!-- Viewer -->
  <div id="viewer-wrap">
    <div id="viewer-placeholder">
      <div class="big">⚛</div>
      <div>Select an object from the inventory to view</div>
      <div style="font-size:10px;color:#222;">or click Render All to generate scenes</div>
    </div>
    <iframe id="viewer-frame" style="display:none" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      Inventory <span id="inv-count">0</span>
      <button id="render-all-btn" onclick="renderAll()">Render All</button>
    </div>
    <div id="inventory-list"></div>
    <div id="library-section">
      <div id="library-header">Library (not rendered)</div>
      <div id="library-list"></div>
    </div>
  </div>

</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
let _objects   = [];   // full library from /api/objects
let _inventory = [];   // rendered items from /api/inventory
let _activeKey = null;

// ── System stats ──────────────────────────────────────────────────────────────
async function pollSystem() {
  try {
    const d = await fetch('/api/system').then(r=>r.json());
    function setStatEl(elId, valId, val, warnAt, critAt) {
      const pct = Math.round(val);
      document.getElementById(valId).textContent = pct + '%';
      const el = document.getElementById(elId);
      el.classList.remove('warn','crit');
      if (pct >= critAt) el.classList.add('crit');
      else if (pct >= warnAt) el.classList.add('warn');
    }
    setStatEl('stat-cpu',  'cpu-val',  d.cpu_pct,  75, 90);
    setStatEl('stat-ram',  'ram-val',  d.ram_pct,  75, 90);
    setStatEl('stat-disk', 'disk-val', d.disk_pct, 80, 95);
  } catch(e) {}
}
setInterval(pollSystem, 5000);
pollSystem();

// ── Indicators ────────────────────────────────────────────────────────────────
function setIndicator(id, active) {
  document.getElementById(id).classList.toggle(
    id === 'ind-net'   ? 'active-net'   :
    id === 'ind-db'    ? 'active-db'    : 'active-local',
    active
  );
}
function flashIndicator(id, ms=3000) {
  setIndicator(id, true);
  setTimeout(()=>setIndicator(id, false), ms);
}

// ── Status message ────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

// ── Load objects + inventory ──────────────────────────────────────────────────
async function loadData() {
  const [objs, inv] = await Promise.all([
    fetch('/api/objects').then(r=>r.json()),
    fetch('/api/inventory').then(r=>r.json()),
  ]);
  _objects   = objs;
  _inventory = inv.renders || [];
  renderSidebar();
}

function renderSidebar() {
  const renderedKeys = new Set(_inventory.map(r=>r.key));

  // Inventory section
  const invList = document.getElementById('inventory-list');
  document.getElementById('inv-count').textContent = _inventory.length;
  invList.innerHTML = '';
  [..._inventory].reverse().forEach(r => {
    const div = document.createElement('div');
    div.className = 'inv-item' + (r.key===_activeKey?' active':'');
    div.dataset.key = r.key;
    div.onclick = () => loadViewer(r.key, r.html_file);
    div.innerHTML = `
      <img class="inv-thumb" src="/renders/${r.key}.png" onerror="this.style.display='none'">
      <div class="inv-info">
        <div class="inv-name">${r.name || r.key}</div>
        <div class="inv-meta">${r.density||'?'}px · ${(r.render_time_s||0).toFixed(1)}s</div>
      </div>
      ${r.html_file ? '<span class="view-badge">3D</span>' : ''}
    `;
    invList.appendChild(div);
  });

  // Library section — unrendered objects
  const libList = document.getElementById('library-list');
  const unrendered = _objects.filter(o=>!renderedKeys.has(o.key));
  libList.innerHTML = '';
  unrendered.forEach(o => {
    const div = document.createElement('div');
    div.className = 'obj-item';
    div.dataset.key = o.key;
    div.onclick = () => triggerRender(o.key);
    div.title = `Click to render ${o.name}`;
    div.innerHTML = `
      <div class="obj-dot">◦</div>
      <div class="inv-info">
        <div class="inv-name">${o.name}</div>
        <div class="inv-meta">${o.primitives} prim</div>
      </div>
    `;
    libList.appendChild(div);
  });
}

// ── Viewer ────────────────────────────────────────────────────────────────────
function loadViewer(key, htmlFile) {
  _activeKey = key;
  document.querySelectorAll('.inv-item').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });

  const frame = document.getElementById('viewer-frame');
  const placeholder = document.getElementById('viewer-placeholder');

  if (htmlFile) {
    placeholder.style.display = 'none';
    frame.style.display = 'block';
    frame.src = '/' + htmlFile + '?t=' + Date.now();
    flashIndicator('ind-local');
  } else {
    // No HTML yet — show placeholder and trigger render
    placeholder.style.display = 'flex';
    frame.style.display = 'none';
    setStatus(`No scene for ${key} yet — rendering now…`);
    triggerRender(key, true);
  }
}

// ── Render trigger ────────────────────────────────────────────────────────────
const _polling = new Set();

async function triggerRender(key, loadAfter=false) {
  if (_polling.has(key)) return;
  const obj = _objects.find(o=>o.key===key);
  setStatus(`Rendering ${obj?.name || key}…`);
  flashIndicator('ind-local', 60000);

  try {
    await fetch(`/api/render/${key}`, {method:'POST'});
    _polling.add(key);
    pollRender(key, loadAfter);
  } catch(e) {
    setStatus(`Error starting render for ${key}`);
  }
}

function pollRender(key, loadAfter) {
  const check = async () => {
    try {
      const d = await fetch(`/api/render-status/${key}`).then(r=>r.json());
      if (d.status === 'done') {
        _polling.delete(key);
        setStatus(`Done: ${key}`);
        await loadData();
        if (loadAfter) {
          const r = _inventory.find(r=>r.key===key);
          if (r) loadViewer(key, r.html_file);
        }
      } else if (d.status === 'error') {
        _polling.delete(key);
        setStatus(`Render failed: ${key}`);
      } else {
        setTimeout(check, 1500);
      }
    } catch(e) {
      setTimeout(check, 2000);
    }
  };
  setTimeout(check, 1500);
}

// ── Render All ────────────────────────────────────────────────────────────────
async function renderAll() {
  const btn = document.getElementById('render-all-btn');
  btn.disabled = true;
  btn.textContent = 'Rendering…';
  const keys = _objects.map(o=>o.key);
  setStatus(`Queuing ${keys.length} renders…`);
  for (const key of keys) {
    try { await fetch(`/api/render/${key}`, {method:'POST'}); } catch(e) {}
  }
  // Poll first one, then refresh sidebar periodically
  if (keys.length > 0) {
    pollRender(keys[0], true);
  }
  let remaining = keys.length;
  const tick = setInterval(async ()=>{
    await loadData();
    remaining--;
    if (remaining <= 0) {
      clearInterval(tick);
      btn.disabled = false;
      btn.textContent = 'Render All';
      setStatus('All renders complete');
    }
  }, 3000);
}

// ── Activity log ─────────────────────────────────────────────────────────────
let _activeJob = null;
let _logOffset = 0;
let _pollTimer = null;

function openActivity(title) {
  document.getElementById('activity').classList.add('open');
  document.getElementById('activity-title').textContent = title;
  document.getElementById('activity-log').innerHTML = '';
  document.getElementById('activity-status').textContent = 'running';
  document.getElementById('activity-status').className = 'running';
  _logOffset = 0;
}

function closeActivity() {
  document.getElementById('activity').classList.remove('open');
  if (_pollTimer) { clearTimeout(_pollTimer); _pollTimer = null; }
}

function appendLog(lines) {
  const el = document.getElementById('activity-log');
  lines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'log-line';
    if (line.startsWith('[Nagatha]')) {
      div.className += ' nagatha';
      line = line.replace('[Nagatha]', '⚛');
    } else if (line.includes('ERROR') || line.includes("I'm sorry")) {
      div.className += ' error';
    } else if (line.startsWith('[Gallery]')) {
      div.className += ' gallery';
      line = line.replace('[Gallery]', '◈');
    } else if (line.includes('successfully') || line.includes('registered')) {
      div.className += ' done';
    }
    div.textContent = line;
    el.appendChild(div);
  });
  el.scrollTop = el.scrollHeight;
}

async function pollJob() {
  if (!_activeJob) return;
  try {
    const d = await fetch(`/api/prompt/${_activeJob}?since=${_logOffset}`).then(r=>r.json());
    if (d.log && d.log.length > 0) {
      appendLog(d.log);
      _logOffset = d.total;
    }
    const statusEl = document.getElementById('activity-status');
    if (d.status === 'running') {
      statusEl.textContent = `running ${d.elapsed}s`;
      statusEl.className = 'running';
      flashIndicator('ind-local', 2000);
      _pollTimer = setTimeout(pollJob, 800);
    } else if (d.status === 'done') {
      statusEl.textContent = `done in ${d.elapsed}s`;
      statusEl.className = 'done';
      setStatus(`Nagatha done: "${d.prompt}"`);
      document.getElementById('submit-btn').disabled = false;
      flashIndicator('ind-local', 1000);
      _activeJob = null;
      // Reload sidebar and auto-load new object
      await loadData();
      if (d.new_key) {
        const r = _inventory.find(r => r.key === d.new_key);
        if (r) loadViewer(r.key, r.html_file);
      }
    } else {
      statusEl.textContent = 'error';
      statusEl.className = 'error';
      setStatus(`Nagatha error on: "${d.prompt}"`);
      document.getElementById('submit-btn').disabled = false;
      _activeJob = null;
    }
  } catch(e) {
    _pollTimer = setTimeout(pollJob, 1500);
  }
}

// ── Nagatha prompt ────────────────────────────────────────────────────────────
async function submitPrompt() {
  const input = document.getElementById('prompt-input');
  const prompt = input.value.trim();
  if (!prompt) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  setStatus(`Sending to Nagatha: "${prompt}"`);

  try {
    const resp = await fetch('/api/prompt', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt}),
    }).then(r=>r.json());

    input.value = '';
    _activeJob = resp.job_id;
    _logOffset = 0;
    openActivity(`⚛ Nagatha — "${prompt}"`);
    pollJob();
  } catch(e) {
    setStatus('Error sending to Nagatha');
    btn.disabled = false;
  }
}

// ── Auto-cycle (every 60s, load next object) ──────────────────────────────────
async function cycleNext() {
  try {
    const d = await fetch('/api/next').then(r=>r.json());
    if (d.html_ready && d.html_url) {
      loadViewer(d.key, d.html_url.replace(/^\//, ''));
    }
  } catch(e) {}
}
setInterval(cycleNext, 60000);

// ── Boot ──────────────────────────────────────────────────────────────────────
loadData().then(() => {
  // Auto-load the most recent render if one exists
  if (_inventory.length > 0) {
    const last = _inventory[_inventory.length - 1];
    if (last.html_file) {
      loadViewer(last.key, last.html_file);
    }
  }
  setStatus(`${_objects.length} objects · ${_inventory.length} rendered`);
});
</script>
</body>
</html>
