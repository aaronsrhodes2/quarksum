<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPX Playground — Circuit Playground Express Emulator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%231a5c2a'/><circle cx='50' cy='25' r='6' fill='%2300ff00'/><circle cx='73' cy='37' r='6' fill='%23ff0000'/><circle cx='73' cy='63' r='6' fill='%230000ff'/><circle cx='50' cy='75' r='6' fill='%23ffff00'/><circle cx='27' cy='63' r='6' fill='%23ff00ff'/><circle cx='27' cy='37' r='6' fill='%2300ffff'/></svg>">

  <!-- CodeMirror 5 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/comment/comment.min.js"></script>

  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>CPX Playground</h1>
      <span class="subtitle">Circuit Playground Express Emulator</span>
    </div>
    <div class="header-center">
      <select id="examples-select" title="Load example code">
        <option value="">— Examples —</option>
        <option value="neopixel_rainbow">NeoPixel Rainbow</option>
        <option value="button_lights">Button Lights</option>
        <option value="temp_monitor">Temperature Monitor</option>
        <option value="light_meter">Light Meter</option>
        <option value="touch_piano">Touch Piano</option>
        <option value="bubble_level">Bubble Level</option>
        <option value="all_sensors">Sensor Dashboard</option>
      </select>
    </div>
    <div class="header-right">
      <span id="status-indicator" class="status-badge status-idle">Idle</span>
      <button id="btn-run" class="btn btn-run" title="Run (Ctrl+Enter)">&#9654; Run</button>
      <button id="btn-stop" class="btn btn-stop" disabled title="Stop (Ctrl+.)">&#9632; Stop</button>
    </div>
  </header>

  <main>
    <section id="editor-panel">
      <div class="panel-header">
        <span>code.py</span>
      </div>
      <div id="editor-container"></div>
    </section>

    <section id="emulator-panel">
      <div id="board-section">
        <div class="panel-header"><span>Board</span></div>
        <div id="board-container"></div>
      </div>
      <div id="sensors-section">
        <div class="panel-header"><span>Sensors &amp; Inputs</span></div>
        <div id="sensors-container">
          <div class="sensor-group">
            <label>Light <span id="val-light" class="sensor-value">128</span></label>
            <input type="range" id="sensor-light" min="0" max="1023" value="128">
          </div>
          <div class="sensor-group">
            <label>Temperature <span id="val-temp" class="sensor-value">25.0°C</span></label>
            <input type="range" id="sensor-temp" min="-40" max="100" value="25" step="0.5">
          </div>
          <div class="sensor-group">
            <label>Sound Level <span id="val-sound" class="sensor-value">0</span></label>
            <input type="range" id="sensor-sound" min="0" max="1023" value="0">
          </div>
          <div class="sensor-group">
            <label>Accel X <span id="val-accel-x" class="sensor-value">0.0</span></label>
            <input type="range" id="sensor-accel-x" min="-20" max="20" value="0" step="0.1">
          </div>
          <div class="sensor-group">
            <label>Accel Y <span id="val-accel-y" class="sensor-value">0.0</span></label>
            <input type="range" id="sensor-accel-y" min="-20" max="20" value="0" step="0.1">
          </div>
          <div class="sensor-group">
            <label>Accel Z <span id="val-accel-z" class="sensor-value">9.8</span></label>
            <input type="range" id="sensor-accel-z" min="-20" max="20" value="9.8" step="0.1">
          </div>
          <div class="touch-pads">
            <label>Touch Pads</label>
            <div class="touch-pad-grid">
              <button class="touch-btn" data-pad="A1">A1</button>
              <button class="touch-btn" data-pad="A2">A2</button>
              <button class="touch-btn" data-pad="A3">A3</button>
              <button class="touch-btn" data-pad="A4">A4</button>
              <button class="touch-btn" data-pad="A5">A5</button>
              <button class="touch-btn" data-pad="A6">A6</button>
              <button class="touch-btn" data-pad="A7">A7</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="console-panel">
    <div class="panel-header">
      <span>Console</span>
      <button id="btn-clear-console" class="btn btn-small" title="Clear console">Clear</button>
    </div>
    <pre id="console-output"></pre>
  </footer>

  <div id="loading-overlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>Loading Python runtime...</p>
    </div>
  </div>

  <script type="module" src="js/app.js?v=2"></script>
</body>
</html>
