<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" width="1200" height="1000">
  <defs>
    <!-- Sphere shading gradients -->
    <radialGradient id="sphere_mother" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ff6633" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#cc3300" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#661100" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#220500" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="sphere_child1" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffaa33" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#ee7700" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#884400" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#331500" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="sphere_child2" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffcc44" stop-opacity="0.65"/>
      <stop offset="30%" stop-color="#ddaa22" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#886600" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#332200" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="sphere_child3" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#88ddff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#4499cc" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#225577" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#112233" stop-opacity="0.15"/>
    </radialGradient>
    <!-- Accretion disk gradient -->
    <radialGradient id="disk_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="18%" stop-color="#000000"/>
      <stop offset="26%" stop-color="#ee2200" stop-opacity="0.8"/>
      <stop offset="36%" stop-color="#ff9900" stop-opacity="0.55"/>
      <stop offset="52%" stop-color="#ffcc22" stop-opacity="0.25"/>
      <stop offset="72%" stop-color="#ff8800" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#220800" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="disk_glow_sm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="20%" stop-color="#000000"/>
      <stop offset="30%" stop-color="#dd2200" stop-opacity="0.75"/>
      <stop offset="42%" stop-color="#ee8800" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ddaa22" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1a0600" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc9955" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1000" fill="#020008"/>

  <!-- Title -->
  <text x="600" y="42" font-family="'Georgia', serif" font-size="22" fill="#cc8844" text-anchor="middle" letter-spacing="4" opacity="0.9">HOW TO SEE OUR UNIVERSE</text>
  <text x="600" y="64" font-family="'Courier New', monospace" font-size="10" fill="#886644" text-anchor="middle" letter-spacing="1" opacity="0.5">Four steps from flat concept to nested reality</text>

  <!-- Divider lines between panels -->
  <line x1="600" y1="85" x2="600" y2="510" stroke="#332211" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="530" x2="600" y2="940" stroke="#332211" stroke-width="0.5" opacity="0.3"/>
  <line x1="40" y1="515" x2="1160" y2="515" stroke="#332211" stroke-width="0.5" opacity="0.3"/>

  <!-- ═══════════════════════════════════ -->
  <!-- STEP 1: Overlapping flat disks      -->
  <!-- Top-left panel                      -->
  <!-- ═══════════════════════════════════ -->
  <text x="300" y="100" font-family="'Georgia', serif" font-size="16" fill="#cc9966" text-anchor="middle" letter-spacing="2" opacity="0.8">STEP 1</text>
  <text x="300" y="120" font-family="'Courier New', monospace" font-size="10" fill="#997755" text-anchor="middle" opacity="0.5">Look at the overlapping black hole disks</text>

  <!-- Mother disk (large, tilted ellipse) -->
  <ellipse cx="280" cy="300" rx="200" ry="100" fill="url(#disk_glow)" filter="url(#glow)"/>
  <ellipse cx="280" cy="300" rx="52" ry="26" fill="none" stroke="#ff4400" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="280" cy="300" rx="40" ry="20" fill="#000000"/>

  <!-- Child disks overlapping — flat, visible, on the surface -->
  <ellipse cx="340" cy="280" rx="70" ry="35" fill="url(#disk_glow_sm)" filter="url(#glow)"/>
  <ellipse cx="340" cy="280" rx="16" ry="8" fill="#000000"/>

  <ellipse cx="240" cy="320" rx="55" ry="27" fill="url(#disk_glow_sm)" opacity="0.8"/>
  <ellipse cx="240" cy="320" rx="12" ry="6" fill="#000000"/>

  <ellipse cx="310" cy="310" rx="40" ry="20" fill="url(#disk_glow_sm)" opacity="0.65"/>
  <ellipse cx="310" cy="310" rx="9" ry="4.5" fill="#000000"/>

  <ellipse cx="260" cy="280" rx="30" ry="15" fill="url(#disk_glow_sm)" opacity="0.55"/>
  <ellipse cx="260" cy="280" rx="7" ry="3.5" fill="#000000"/>

  <!-- Labels -->
  <text x="130" y="230" font-family="'Courier New', monospace" font-size="8" fill="#ff8844" opacity="0.45">mother disk</text>
  <path d="M 170,232 L 220,270" fill="none" stroke="#664422" stroke-width="0.3" opacity="0.3"/>
  <text x="400" y="265" font-family="'Courier New', monospace" font-size="8" fill="#ffaa44" opacity="0.45">children</text>
  <text x="400" y="276" font-family="'Courier New', monospace" font-size="8" fill="#ffaa44" opacity="0.45">overlapping</text>
  <path d="M 395,270 L 370,278" fill="none" stroke="#664422" stroke-width="0.3" opacity="0.3"/>

  <text x="300" y="430" font-family="'Courier New', monospace" font-size="9" fill="#886655" text-anchor="middle" opacity="0.4" font-style="italic">This is what you see on the page.</text>
  <text x="300" y="445" font-family="'Courier New', monospace" font-size="9" fill="#886655" text-anchor="middle" opacity="0.4" font-style="italic">Flat. 2D. One dimension missing.</text>

  <!-- ═══════════════════════════════════ -->
  <!-- STEP 2: Disks become spheres        -->
  <!-- Top-right panel                     -->
  <!-- ═══════════════════════════════════ -->
  <text x="900" y="100" font-family="'Georgia', serif" font-size="16" fill="#cc9966" text-anchor="middle" letter-spacing="2" opacity="0.8">STEP 2</text>
  <text x="900" y="120" font-family="'Courier New', monospace" font-size="10" fill="#997755" text-anchor="middle" opacity="0.5">Make the disks into overlapping spheres</text>

  <!-- Mother sphere (large circle with 3D shading) -->
  <circle cx="880" cy="300" r="150" fill="url(#sphere_mother)" stroke="#cc4400" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <!-- Highlight arc for 3D effect -->
  <path d="M 790,200 A 150,150 0 0,1 960,200" fill="none" stroke="#ff8855" stroke-width="1" opacity="0.25"/>

  <!-- Child spheres overlapping — sticking out -->
  <circle cx="960" cy="260" r="55" fill="url(#sphere_child1)" stroke="#ee7700" stroke-width="1.2" opacity="0.7" filter="url(#glow)"/>
  <path d="M 930,215 A 55,55 0 0,1 1000,225" fill="none" stroke="#ffbb55" stroke-width="0.7" opacity="0.2"/>

  <circle cx="820" cy="370" r="42" fill="url(#sphere_child2)" stroke="#ddaa22" stroke-width="1" opacity="0.6"/>
  <path d="M 795,335 A 42,42 0 0,1 850,340" fill="none" stroke="#ffdd66" stroke-width="0.6" opacity="0.2"/>

  <circle cx="920" cy="360" r="32" fill="url(#sphere_child1)" stroke="#cc7711" stroke-width="0.8" opacity="0.55"/>

  <circle cx="850" cy="260" r="25" fill="url(#sphere_child3)" stroke="#4499bb" stroke-width="0.7" opacity="0.5"/>

  <!-- Labels -->
  <text x="730" y="195" font-family="'Courier New', monospace" font-size="8" fill="#ff8844" opacity="0.45">mother sphere</text>
  <path d="M 775,197 L 810,230" fill="none" stroke="#664422" stroke-width="0.3" opacity="0.3"/>
  <text x="1020" y="255" font-family="'Courier New', monospace" font-size="8" fill="#ffaa44" opacity="0.45">children</text>
  <text x="1020" y="266" font-family="'Courier New', monospace" font-size="8" fill="#ffaa44" opacity="0.45">overlapping</text>
  <path d="M 1015,260 L 1000,260" fill="none" stroke="#664422" stroke-width="0.3" opacity="0.3"/>

  <text x="900" y="430" font-family="'Courier New', monospace" font-size="9" fill="#886655" text-anchor="middle" opacity="0.4" font-style="italic">Put this in your mind. Add the</text>
  <text x="900" y="445" font-family="'Courier New', monospace" font-size="9" fill="#886655" text-anchor="middle" opacity="0.4" font-style="italic">missing dimension. Disks → spheres.</text>

  <!-- Arrow between step 1 and 2 -->
  <line x1="530" y1="300" x2="580" y2="300" stroke="#cc9955" stroke-width="1" opacity="0.4" marker-end="url(#arrowRight)"/>

  <!-- ═══════════════════════════════════ -->
  <!-- STEP 3: Spheres go INSIDE mother    -->
  <!-- Bottom-left panel                   -->
  <!-- ═══════════════════════════════════ -->
  <text x="300" y="545" font-family="'Georgia', serif" font-size="16" fill="#cc9966" text-anchor="middle" letter-spacing="2" opacity="0.8">STEP 3</text>
  <text x="300" y="565" font-family="'Courier New', monospace" font-size="10" fill="#997755" text-anchor="middle" opacity="0.5">Put the spheres inside the mother, smaller</text>

  <!-- Mother sphere — semi-transparent to show insides -->
  <circle cx="300" cy="735" r="150" fill="none" stroke="#cc4400" stroke-width="2" opacity="0.35" filter="url(#glow)"/>
  <circle cx="300" cy="735" r="150" fill="#cc330008"/>
  <!-- Cutaway shading — faint fill to show it's a volume -->
  <path d="M 185,635 A 150,150 0 0,1 415,635" fill="none" stroke="#ff7744" stroke-width="1" opacity="0.15"/>
  <path d="M 165,700 A 150,150 0 0,0 165,770" fill="none" stroke="#ff5533" stroke-width="0.5" opacity="0.1"/>

  <!-- Children INSIDE — smaller, nested -->
  <circle cx="340" cy="700" r="45" fill="url(#sphere_child1)" stroke="#ee7700" stroke-width="1.2" opacity="0.65" filter="url(#glow)"/>
  <path d="M 310,662 A 45,45 0 0,1 375,670" fill="none" stroke="#ffbb55" stroke-width="0.6" opacity="0.2"/>

  <circle cx="260" cy="770" r="35" fill="url(#sphere_child2)" stroke="#ddaa22" stroke-width="1" opacity="0.55"/>
  <path d="M 238,740 A 35,35 0 0,1 285,742" fill="none" stroke="#ffdd66" stroke-width="0.5" opacity="0.2"/>

  <circle cx="330" cy="770" r="28" fill="url(#sphere_child1)" stroke="#cc7711" stroke-width="0.8" opacity="0.5"/>

  <circle cx="280" cy="710" r="20" fill="url(#sphere_child3)" stroke="#4499bb" stroke-width="0.7" opacity="0.45"/>

  <!-- Tiny grandchildren inside the largest child -->
  <circle cx="355" cy="690" r="8" fill="url(#sphere_child2)" stroke="#bb8811" stroke-width="0.4" opacity="0.4"/>
  <circle cx="335" cy="705" r="6" fill="url(#sphere_child3)" stroke="#338899" stroke-width="0.3" opacity="0.35"/>
  <circle cx="348" cy="712" r="5" fill="url(#sphere_child1)" stroke="#aa6600" stroke-width="0.3" opacity="0.3"/>

  <!-- Labels -->
  <text x="135" y="620" font-family="'Courier New', monospace" font-size="8" fill="#ff8844" opacity="0.45">mother (transparent</text>
  <text x="135" y="631" font-family="'Courier New', monospace" font-size="8" fill="#ff8844" opacity="0.45">to see inside)</text>
  <path d="M 195,633 L 230,680" fill="none" stroke="#664422" stroke-width="0.3" opacity="0.3"/>
  <text x="400" y="695" font-family="'Courier New', monospace" font-size="8" fill="#ffaa44" opacity="0.45">children inside,</text>
  <text x="400" y="706" font-family="'Courier New', monospace" font-size="8" fill="#ffaa44" opacity="0.45">smaller</text>
  <text x="380" y="720" font-family="'Courier New', monospace" font-size="7" fill="#88aacc" opacity="0.35">grandchildren</text>
  <text x="380" y="730" font-family="'Courier New', monospace" font-size="7" fill="#88aacc" opacity="0.35">inside children</text>

  <text x="300" y="870" font-family="'Courier New', monospace" font-size="9" fill="#886655" text-anchor="middle" opacity="0.4" font-style="italic">Not overlapping. INSIDE. Smaller.</text>
  <text x="300" y="885" font-family="'Courier New', monospace" font-size="9" fill="#886655" text-anchor="middle" opacity="0.4" font-style="italic">Russian dolls. Each one contains the next.</text>

  <!-- Arrow from step 2 to step 3 -->
  <line x1="540" y1="470" x2="540" y2="530" stroke="#cc9955" stroke-width="1" opacity="0.4" marker-end="url(#arrowRight)" transform="rotate(90,540,500)"/>

  <!-- ═══════════════════════════════════ -->
  <!-- STEP 4: Each sphere IS a funnel     -->
  <!-- Bottom-right panel                  -->
  <!-- ═══════════════════════════════════ -->
  <text x="900" y="545" font-family="'Georgia', serif" font-size="16" fill="#cc9966" text-anchor="middle" letter-spacing="2" opacity="0.8">STEP 4</text>
  <text x="900" y="565" font-family="'Courier New', monospace" font-size="10" fill="#997755" text-anchor="middle" opacity="0.5">Each sphere is a funnel — just like this image</text>

  <!-- Mother sphere peeled open to show it's a funnel -->
  <!-- Draw as a sphere with a wedge cut out revealing nested structure -->
  <circle cx="900" cy="735" r="150" fill="none" stroke="#cc4400" stroke-width="1.5" opacity="0.25" stroke-dasharray="8,4"/>
  <circle cx="900" cy="735" r="150" fill="#cc220005"/>

  <!-- The "peeled" section — funnel rings visible inside -->
  <!-- Concentric ellipses representing the funnel nesting -->
  <ellipse cx="900" cy="735" rx="130" ry="65" fill="none" stroke="#ff6600" stroke-width="1.5" opacity="0.20" stroke-dasharray="12,20,8,15"/>
  <ellipse cx="900" cy="735" rx="105" ry="52" fill="none" stroke="#ff4400" stroke-width="1.8" opacity="0.25" stroke-dasharray="25,30,15,25"/>
  <ellipse cx="900" cy="735" rx="80" ry="40" fill="none" stroke="#ffaa00" stroke-width="1.2" opacity="0.18" stroke-dasharray="15,22"/>

  <!-- Child funnel sphere — visible inside, with its own rings -->
  <circle cx="940" cy="710" r="45" fill="none" stroke="#ee7700" stroke-width="1.2" opacity="0.5" filter="url(#glow)"/>
  <circle cx="940" cy="710" r="45" fill="#ee550008"/>
  <ellipse cx="940" cy="710" rx="36" ry="18" fill="none" stroke="#ff8833" stroke-width="0.8" opacity="0.25" stroke-dasharray="8,12"/>
  <ellipse cx="940" cy="710" rx="25" ry="12" fill="none" stroke="#ffaa44" stroke-width="0.6" opacity="0.20" stroke-dasharray="6,10"/>
  <!-- Grandchild inside child -->
  <circle cx="950" cy="705" r="12" fill="none" stroke="#ddaa22" stroke-width="0.8" opacity="0.4" filter="url(#glow)"/>
  <circle cx="950" cy="705" r="12" fill="#dd880008"/>
  <ellipse cx="950" cy="705" rx="9" ry="4.5" fill="none" stroke="#ffcc55" stroke-width="0.4" opacity="0.2"/>
  <!-- Great-grandchild -->
  <circle cx="952" cy="704" r="4" fill="none" stroke="#88bbdd" stroke-width="0.4" opacity="0.3"/>
  <circle cx="952" cy="704" r="1.5" fill="#445566" opacity="0.4"/>

  <!-- Second child -->
  <circle cx="870" cy="760" r="32" fill="none" stroke="#ddaa22" stroke-width="1" opacity="0.4"/>
  <circle cx="870" cy="760" r="32" fill="#cc880006"/>
  <ellipse cx="870" cy="760" rx="24" ry="12" fill="none" stroke="#ffbb44" stroke-width="0.5" opacity="0.18" stroke-dasharray="6,9"/>
  <circle cx="875" cy="758" r="8" fill="none" stroke="#aa7711" stroke-width="0.5" opacity="0.3"/>
  <circle cx="875" cy="758" r="3" fill="#332200" opacity="0.3"/>

  <!-- Third child -->
  <circle cx="910" cy="760" r="22" fill="none" stroke="#cc7711" stroke-width="0.7" opacity="0.35"/>
  <circle cx="910" cy="760" r="22" fill="#bb660005"/>
  <circle cx="912" cy="759" r="6" fill="none" stroke="#997711" stroke-width="0.4" opacity="0.25"/>

  <!-- Recursion arrows — tiny curved arrows showing "look inside" -->
  <path d="M 985,710 Q 1005,700 1000,680" fill="none" stroke="#ffaa44" stroke-width="0.8" opacity="0.3" marker-end="url(#arrowRight)"/>
  <text x="1005" y="678" font-family="'Courier New', monospace" font-size="6" fill="#ffaa44" opacity="0.3">zoom in</text>

  <path d="M 962,705 Q 975,695 970,685" fill="none" stroke="#88bbdd" stroke-width="0.5" opacity="0.25" marker-end="url(#arrowRight)"/>
  <text x="972" y="683" font-family="'Courier New', monospace" font-size="5" fill="#88bbdd" opacity="0.25">again</text>

  <!-- Labels -->
  <text x="750" y="625" font-family="'Courier New', monospace" font-size="8" fill="#ff8844" opacity="0.45">mother = funnel</text>
  <text x="750" y="636" font-family="'Courier New', monospace" font-size="8" fill="#ff8844" opacity="0.45">(patchy, dying)</text>
  <path d="M 815,630 L 850,680" fill="none" stroke="#664422" stroke-width="0.3" opacity="0.3"/>

  <text x="1000" y="695" font-family="'Courier New', monospace" font-size="8" fill="#ffaa44" opacity="0.45">child = funnel</text>
  <text x="1000" y="706" font-family="'Courier New', monospace" font-size="8" fill="#ffaa44" opacity="0.45">(alive, bright)</text>

  <text x="1000" y="755" font-family="'Courier New', monospace" font-size="7" fill="#88aacc" opacity="0.35">contains its own</text>
  <text x="1000" y="765" font-family="'Courier New', monospace" font-size="7" fill="#88aacc" opacity="0.35">children-funnels</text>

  <text x="900" y="870" font-family="'Courier New', monospace" font-size="9" fill="#886655" text-anchor="middle" opacity="0.4" font-style="italic">Every sphere is the same picture you started with.</text>
  <text x="900" y="885" font-family="'Courier New', monospace" font-size="9" fill="#886655" text-anchor="middle" opacity="0.4" font-style="italic">Funnels inside funnels inside funnels. All the way down.</text>

  <!-- Arrow from step 3 to step 4 -->
  <line x1="530" y1="735" x2="580" y2="735" stroke="#cc9955" stroke-width="1" opacity="0.4" marker-end="url(#arrowRight)"/>

  <!-- ═══ BOTTOM TEXT ═══ -->
  <line x1="80" y1="920" x2="1120" y2="920" stroke="#332211" stroke-width="0.5" opacity="0.3"/>
  <text x="600" y="948" font-family="'Georgia', serif" font-size="13" fill="#aa8855" text-anchor="middle" font-style="italic" opacity="0.6">You cannot draw the real structure — it is infinite and self-similar.</text>
  <text x="600" y="968" font-family="'Georgia', serif" font-size="13" fill="#aa8855" text-anchor="middle" font-style="italic" opacity="0.6">But your mind can hold it. Start with the flat image. Build up.</text>
  <text x="600" y="990" font-family="'Courier New', monospace" font-size="9" fill="#665544" text-anchor="middle" opacity="0.35">SSBM Chiral Funnel — Viewing Guide</text>
</svg>
