<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 900" font-family="Courier New, monospace">
  <rect width="680" height="900" fill="#0a0a12"/>

  <text x="340" y="28" fill="#00d4ff" font-size="14" text-anchor="middle" font-weight="bold">BH Conversion Event vs Big Bang</text>
  <text x="340" y="44" fill="#666" font-size="9" text-anchor="middle">SSBM model — all from CONSTANTS, no external physics</text>

  <!-- SECTION 1: The Setup -->
  <rect x="20" y="58" width="640" height="80" fill="#111" stroke="#333" rx="3"/>
  <text x="30" y="76" fill="#00d4ff" font-size="10">THE QUESTION</text>
  <text x="30" y="92" fill="#ccc" font-size="9">If the Big Bang was a BH conversion event, does our model</text>
  <text x="30" y="104" fill="#ccc" font-size="9">predict the right energy, baryons, temperature, and density?</text>
  <text x="30" y="120" fill="#888" font-size="8">Input: BH mass = observable universe mass (1.5×10⁵³ kg)</text>
  <text x="30" y="132" fill="#888" font-size="8">Physics: σ-field profile + nuclear binding + Schwarzschild geometry</text>

  <!-- SECTION 2: Scorecard -->
  <text x="30" y="162" fill="#00d4ff" font-size="11" font-weight="bold">SCORECARD</text>

  <!-- Headers -->
  <rect x="20" y="170" width="640" height="22" fill="#1a1a2a"/>
  <text x="30" y="185" fill="#00d4ff" font-size="9">Observable</text>
  <text x="230" y="185" fill="#00d4ff" font-size="9">Our Model</text>
  <text x="430" y="185" fill="#00d4ff" font-size="9">Big Bang</text>
  <text x="590" y="185" fill="#00d4ff" font-size="9">Match?</text>

  <!-- Row: Energy -->
  <rect x="20" y="192" width="640" height="28" fill="#111" stroke="#222"/>
  <text x="30" y="210" fill="#ccc" font-size="9">Total energy (Mc²)</text>
  <text x="230" y="210" fill="#eee" font-size="9">1.35 × 10⁷⁰ J</text>
  <text x="430" y="210" fill="#eee" font-size="9">1.35 × 10⁷⁰ J</text>
  <text x="590" y="210" fill="#00ff88" font-size="11" font-weight="bold">✓ 1.00×</text>

  <!-- Row: Baryons -->
  <rect x="20" y="220" width="640" height="28" fill="#0d0d16" stroke="#222"/>
  <text x="30" y="238" fill="#ccc" font-size="9">Baryon count</text>
  <text x="230" y="238" fill="#eee" font-size="9">8.97 × 10⁷⁹</text>
  <text x="430" y="238" fill="#eee" font-size="9">~10⁸⁰</text>
  <text x="590" y="238" fill="#00ff88" font-size="11" font-weight="bold">✓ 0.90×</text>

  <!-- Row: Schwarzschild radius -->
  <rect x="20" y="248" width="640" height="28" fill="#111" stroke="#222"/>
  <text x="30" y="266" fill="#ccc" font-size="9">Event horizon radius</text>
  <text x="230" y="266" fill="#eee" font-size="9">23.5 billion ly</text>
  <text x="430" y="266" fill="#eee" font-size="9">Observable: ~46B ly</text>
  <text x="590" y="266" fill="#ffcc00" font-size="11" font-weight="bold">~ 0.5×</text>

  <!-- Row: Temperature (10 M☉ BH) -->
  <rect x="20" y="276" width="640" height="28" fill="#0d0d16" stroke="#222"/>
  <text x="30" y="294" fill="#ccc" font-size="9">T at conversion (10 M☉)</text>
  <text x="230" y="294" fill="#eee" font-size="9">8.0 × 10¹¹ K</text>
  <text x="430" y="294" fill="#eee" font-size="9">QCD: 1.7 × 10¹² K</text>
  <text x="590" y="294" fill="#ffcc00" font-size="11" font-weight="bold">~ 0.5×</text>

  <!-- Row: Density (10 M☉ BH) -->
  <rect x="20" y="304" width="640" height="28" fill="#111" stroke="#222"/>
  <text x="30" y="322" fill="#ccc" font-size="9">ρ at horizon (10 M☉)</text>
  <text x="230" y="322" fill="#eee" font-size="9">1.84 × 10¹⁷ kg/m³</text>
  <text x="430" y="322" fill="#eee" font-size="9">Nuclear: 2.7 × 10¹⁷</text>
  <text x="590" y="322" fill="#00ff88" font-size="11" font-weight="bold">✓ 0.7×</text>

  <!-- Row: Deconfinement -->
  <rect x="20" y="332" width="640" height="28" fill="#0d0d16" stroke="#222"/>
  <text x="30" y="350" fill="#ccc" font-size="9">Deconfinement σ_c</text>
  <text x="230" y="350" fill="#eee" font-size="9">σ = −1.71 (Λ_eff/Λ_QCD = 0.18)</text>
  <text x="430" y="350" fill="#eee" font-size="9">QCD predicts transition</text>
  <text x="590" y="350" fill="#00d4ff" font-size="9">New prediction</text>

  <!-- SECTION 3: σ-Profile Chart -->
  <text x="30" y="385" fill="#00d4ff" font-size="11" font-weight="bold">σ-FIELD PROFILE: Infinity → Event Horizon</text>

  <rect x="40" y="395" width="600" height="140" fill="#111" stroke="#333" rx="3"/>

  <!-- Axis labels -->
  <text x="35" y="408" fill="#666" font-size="7" text-anchor="end">0.08</text>
  <text x="35" y="460" fill="#666" font-size="7" text-anchor="end">0.04</text>
  <text x="35" y="530" fill="#666" font-size="7" text-anchor="end">0.00</text>

  <text x="55" y="545" fill="#666" font-size="7">100 r_s</text>
  <text x="200" y="545" fill="#666" font-size="7">10 r_s</text>
  <text x="380" y="545" fill="#666" font-size="7">3 r_s</text>
  <text x="520" y="545" fill="#666" font-size="7">1.5 r_s</text>
  <text x="610" y="545" fill="#666" font-size="7">r_s</text>

  <!-- σ curve: rises from ~0 at 100r_s to 0.079 at r_s -->
  <!-- Y: 0.08→top(400), 0→bottom(530). Scale: 130px / 0.08 = 1625 px/unit -->
  <polyline points="55,529 120,528 200,520 280,514 380,498 450,480 520,465 570,440 610,400"
            fill="none" stroke="#00d4ff" stroke-width="2.5"/>

  <!-- Reference lines -->
  <line x1="40" y1="400" x2="640" y2="400" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4"/>
  <text x="645" y="403" fill="#888" font-size="7">ξ/2 (horizon)</text>
  <line x1="40" y1="465" x2="640" y2="465" stroke="#333" stroke-width="0.5" stroke-dasharray="2,4"/>
  <text x="645" y="468" fill="#888" font-size="7">ξ/6 (ISCO)</text>

  <!-- SECTION 4: Key Physics Insight -->
  <rect x="20" y="555" width="640" height="120" fill="#1a1a2a" stroke="#00d4ff" rx="3"/>
  <text x="30" y="575" fill="#00ff88" font-size="10" font-weight="bold">KEY FINDINGS</text>

  <text x="30" y="595" fill="#ccc" font-size="9">1. Energy &amp; baryons match exactly (by construction: same mass)</text>
  <text x="30" y="612" fill="#ccc" font-size="9">2. 10 M☉ BH density at horizon = nuclear density (0.7×) — remarkable</text>
  <text x="30" y="629" fill="#ccc" font-size="9">3. 10 M☉ BH temperature ≈ QCD transition temperature (within 2×)</text>
  <text x="30" y="646" fill="#ccc" font-size="9">4. Deconfinement at σ_c = −1.71: QCD weakens to 18% strength</text>
  <text x="30" y="663" fill="#ffcc00" font-size="9">5. Positive σ makes nuclei MORE bound — conversion isn't σ-driven</text>

  <!-- SECTION 5: The Real Insight -->
  <rect x="20" y="685" width="640" height="100" fill="#111" stroke="#333" rx="3"/>
  <text x="30" y="705" fill="#ff4444" font-size="10" font-weight="bold">THE TWIST</text>

  <text x="30" y="725" fill="#ccc" font-size="9">In our model, positive σ (near BHs) INCREASES nuclear binding.</text>
  <text x="30" y="742" fill="#ccc" font-size="9">Nuclei don't deconfine from σ — they deconfine from TIDAL FORCES.</text>
  <text x="30" y="759" fill="#ccc" font-size="9">The Kretschner scalar, not σ, drives nuclear disruption.</text>
  <text x="30" y="776" fill="#ccc" font-size="9">σ shifts HOW matter reconstitutes after tidal disruption.</text>

  <!-- SECTION 6: Three BH comparison -->
  <text x="30" y="810" fill="#00d4ff" font-size="10" font-weight="bold">ACROSS MASS SCALES</text>

  <rect x="20" y="818" width="640" height="22" fill="#1a1a2a"/>
  <text x="30" y="833" fill="#00d4ff" font-size="8">BH Mass</text>
  <text x="160" y="833" fill="#00d4ff" font-size="8">r_s</text>
  <text x="280" y="833" fill="#00d4ff" font-size="8">ρ_horizon</text>
  <text x="420" y="833" fill="#00d4ff" font-size="8">T_conversion</text>
  <text x="560" y="833" fill="#00d4ff" font-size="8">Match?</text>

  <rect x="20" y="840" width="640" height="18" fill="#111"/>
  <text x="30" y="853" fill="#eee" font-size="8">10 M☉</text>
  <text x="160" y="853" fill="#eee" font-size="8">30 km</text>
  <text x="280" y="853" fill="#00ff88" font-size="8">1.8×10¹⁷ ≈ nuclear ✓</text>
  <text x="420" y="853" fill="#ffcc00" font-size="8">8×10¹¹ K ≈ QCD ~</text>
  <text x="560" y="853" fill="#00ff88" font-size="8">Strong</text>

  <rect x="20" y="858" width="640" height="18" fill="#0d0d16"/>
  <text x="30" y="871" fill="#eee" font-size="8">4×10⁶ M☉ (Sgr A*)</text>
  <text x="160" y="871" fill="#eee" font-size="8">12 Gm</text>
  <text x="280" y="871" fill="#eee" font-size="8">1.2×10⁶</text>
  <text x="420" y="871" fill="#eee" font-size="8">1.3×10⁹ K</text>
  <text x="560" y="871" fill="#ffcc00" font-size="8">Moderate</text>

  <rect x="20" y="876" width="640" height="18" fill="#111"/>
  <text x="30" y="889" fill="#eee" font-size="8">Universe (1.5×10⁵³)</text>
  <text x="160" y="889" fill="#eee" font-size="8">23.5 Gly</text>
  <text x="280" y="889" fill="#eee" font-size="8">3.2×10⁻²⁷</text>
  <text x="420" y="889" fill="#eee" font-size="8">9 K ≈ CMB(!)</text>
  <text x="560" y="889" fill="#00d4ff" font-size="8">Intriguing</text>
</svg>
