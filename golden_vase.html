<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Vase — Ray-Marched SDF</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
#info {
  position: fixed; bottom: 12px; left: 12px;
  color: rgba(255,220,140,0.6); font: 11px monospace;
  pointer-events: none; z-index: 10;
}
#camera-mode {
  position: fixed; top: 12px; right: 12px;
  z-index: 10; font: 12px monospace;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,200,80,0.3);
  border-radius: 6px; padding: 8px 14px;
  color: rgba(255,220,140,0.8); cursor: pointer;
  user-select: none; transition: all 0.3s;
}
#camera-mode:hover { border-color: rgba(255,200,80,0.6); }
#camera-mode .label { font-size: 10px; opacity: 0.5; display: block; margin-bottom: 2px; }
#camera-mode .mode { font-size: 13px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">□σ = −ξR · Au(Z=79) · ray-marched SDF</div>
<div id="camera-mode" onclick="toggleCameraMode()">
  <span class="label">CAMERA</span>
  <span class="mode" id="mode-text">NON-OBSERVER VIEWPOINT</span>
</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:2em">WebGL not supported</p>'; }

// ── High resolution ──
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2.0);
  canvas.width  = Math.floor(window.innerWidth  * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// ── Shaders ──
const vsrc = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const fsrc = `
#ifdef GL_ES
precision highp float;
#endif
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;
uniform float u_observer; // 0 = non-observer, 1 = observer

// ═══════════════════════════════════════════════════════════
// PHYSICS CONSTANTS — from local_library
// Gold: Z=79, FCC, a=4.08Å, density=19300 kg/m³
// Surface energy γ_Au ≈ 1.5 J/m², Fermi energy 5.53 eV
// Reflectivity: gold reflects >95% above 600nm (warm tones)
// Absorption edge at ~520nm gives gold its color
// ═══════════════════════════════════════════════════════════

#define PI 3.14159265359
#define TAU 6.28318530718
#define MAX_STEPS 200
#define MAX_DIST 40.0
#define SURF_DIST 0.0005

// ── SDF primitives ──
float sdSphere(vec3 p, float r) { return length(p) - r; }
float sdCylinder(vec3 p, float r, float h) {
  vec2 d = abs(vec2(length(p.xz), p.y)) - vec2(r, h);
  return min(max(d.x, d.y), 0.0) + length(max(d, 0.0));
}
float sdTorus(vec3 p, vec2 t) {
  vec2 q = vec2(length(p.xz) - t.x, p.y);
  return length(q) - t.y;
}
float sdBox(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
}

// Smooth operators
float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}
float smax(float a, float b, float k) { return -smin(-a, -b, k); }

// Rotation
mat2 rot(float a) { float c=cos(a),s=sin(a); return mat2(c,-s,s,c); }

// ── Vase profile (SDF of revolution) ──
float sdVaseProfile(vec3 p) {
  // Revolution around Y axis
  float r = length(p.xz);
  float y = p.y;

  // Vase profile: a smooth curve
  // Base: wide, then narrows, then belly, then neck, then lip
  float base_y = -2.0;
  float top_y = 2.8;
  float t = (y - base_y) / (top_y - base_y); // 0 to 1

  if (t < 0.0 || t > 1.0) return 1.0; // outside

  // Profile radius as function of height
  float base_r = 0.8;
  float stem_r = 0.55;
  float belly_r = 1.3;
  float neck_r = 0.45;
  float lip_r = 0.65;

  // Piecewise smooth profile
  float pr;
  if (t < 0.08) {
    // Base foot
    pr = mix(base_r, base_r * 0.95, smoothstep(0.0, 0.08, t));
  } else if (t < 0.15) {
    // Foot to stem
    pr = mix(base_r * 0.95, stem_r, smoothstep(0.08, 0.15, t));
  } else if (t < 0.5) {
    // Stem to belly (smooth bulge)
    float s = smoothstep(0.15, 0.5, t);
    pr = mix(stem_r, belly_r, sin(s * PI * 0.5));
  } else if (t < 0.7) {
    // Belly to neck
    float s = smoothstep(0.5, 0.7, t);
    pr = mix(belly_r, neck_r, s * s);
  } else if (t < 0.9) {
    // Neck (slight taper)
    pr = mix(neck_r, neck_r * 0.9, smoothstep(0.7, 0.9, t));
  } else {
    // Lip flare
    float s = smoothstep(0.9, 1.0, t);
    pr = mix(neck_r * 0.9, lip_r, sin(s * PI * 0.5));
  }

  // Wall thickness
  float wall = 0.06;
  float outer = r - pr;
  float inner = -(r - (pr - wall));

  // Hollow vase (outer - inner)
  float d = max(outer, inner);

  // Bottom cap
  float bottom = -(y - (base_y + 0.04));
  d = max(d, bottom);

  return d;
}

// ── Gold decorative band ──
float sdGoldBand(vec3 p, float y_center, float vase_r, float band_h, float band_depth) {
  float r = length(p.xz);
  float dy = abs(p.y - y_center) - band_h;
  float dr = r - vase_r - band_depth * 0.5;
  float di = -(r - vase_r + 0.01);
  float d = max(max(dy, dr), di);
  return d;
}

// ── Ornate gold filigree (repeating pattern around circumference) ──
float sdFiligree(vec3 p, float y_center, float vase_r, int count) {
  float angle = atan(p.z, p.x);
  float r = length(p.xz);

  // Repeat around circumference
  float sector = TAU / float(count);
  float a = mod(angle + sector * 0.5, sector) - sector * 0.5;

  // Local coordinates on the vase surface
  vec3 lp = vec3(r * cos(a) - vase_r, p.y - y_center, r * sin(a));

  // Scrollwork: S-curves made from offset toruses
  float scroll1 = sdTorus(vec3(lp.x, lp.y - 0.12, lp.z), vec2(0.08, 0.018));
  float scroll2 = sdTorus(vec3(lp.x, lp.y + 0.12, lp.z), vec2(0.08, 0.018));

  // Central medallion
  float medal = sdSphere(lp, 0.04);

  // Connecting stems
  float stem = sdCylinder(vec3(lp.z, lp.y, lp.x), 0.012, 0.18);

  float d = min(min(scroll1, scroll2), min(medal, stem));
  return d;
}

// ── Leaf motif ──
float sdLeaf(vec3 p, float y_center, float vase_r, int count) {
  float angle = atan(p.z, p.x);
  float r = length(p.xz);
  float sector = TAU / float(count);
  float a = mod(angle + sector * 0.5, sector) - sector * 0.5;

  vec3 lp = vec3(r * cos(a) - vase_r, p.y - y_center, r * sin(a));

  // Leaf shape: elongated ellipsoid
  vec3 scaled = vec3(lp.x * 8.0, lp.y * 3.0, lp.z * 8.0);
  float leaf = (length(scaled) - 1.0) / 8.0;

  // Leaf vein (central ridge)
  float vein = sdCylinder(vec3(lp.z, lp.y, lp.x), 0.008, 0.15);

  return min(leaf, vein);
}

// ── Beaded ring ──
float sdBeadRing(vec3 p, float y_center, float vase_r, int count) {
  float angle = atan(p.z, p.x);
  float r = length(p.xz);
  float sector = TAU / float(count);
  float a = mod(angle + sector * 0.5, sector) - sector * 0.5;

  vec3 lp = vec3(r * cos(a) - vase_r, p.y - y_center, r * sin(a));
  return sdSphere(lp, 0.022);
}

// ── Greek key / meander band ──
float sdMeanderBand(vec3 p, float y_center, float vase_r) {
  float angle = atan(p.z, p.x);
  float r = length(p.xz);
  float dy = p.y - y_center;

  // Map to surface UV
  float u = angle / TAU * 12.0; // 12 repeats
  float v = dy * 15.0;

  // Meander pattern via step functions
  float uf = fract(u);
  float vf = fract(v * 0.5 + 0.25);

  // Simple rectangular wave meander
  float pattern = 0.0;
  float step1 = step(0.2, uf) * step(uf, 0.8);
  float step2 = step(0.3, vf) * step(vf, 0.7);
  pattern = max(step1, step2);

  float band_d = max(abs(dy) - 0.15, r - vase_r - 0.02);
  band_d = max(band_d, -(r - vase_r + 0.005));

  // Only where pattern is active, raise the surface
  float raised = max(abs(dy) - 0.15, r - vase_r - 0.035);
  raised = max(raised, -(r - vase_r + 0.005));

  return pattern > 0.5 ? raised : band_d;
}

// ═══════════════════════════════════════════════════════════
// MATERIAL IDs
// 0 = ceramic (deep blue / porcelain)
// 1 = gold decoration
// 2 = floor / pedestal
// ═══════════════════════════════════════════════════════════

vec2 mapScene(vec3 p) {
  // Pedestal
  float pedestal = sdCylinder(p - vec3(0, -2.5, 0), 1.5, 0.5);
  pedestal = smax(pedestal, -sdCylinder(p - vec3(0, -2.5, 0), 1.3, 0.6), 0.05);
  vec2 res = vec2(pedestal, 2.0);

  // Pedestal gold rim
  float ped_rim = sdTorus(p - vec3(0, -2.0, 0), vec2(1.5, 0.03));
  if (ped_rim < res.x) res = vec2(ped_rim, 1.0);
  float ped_rim2 = sdTorus(p - vec3(0, -3.0, 0), vec2(1.5, 0.04));
  if (ped_rim2 < res.x) res = vec2(ped_rim2, 1.0);

  // Vase body
  float vase = sdVaseProfile(p);
  if (vase < res.x) res = vec2(vase, 0.0);

  // ── Gold decorations ──

  // Bottom gold band
  float band1 = sdGoldBand(p, -1.55, 0.72, 0.04, 0.03);
  if (band1 < res.x) res = vec2(band1, 1.0);

  // Top of foot band
  float band_foot = sdGoldBand(p, -1.3, 0.60, 0.02, 0.025);
  if (band_foot < res.x) res = vec2(band_foot, 1.0);

  // Belly bands (pair)
  float band2 = sdGoldBand(p, -0.1, 1.28, 0.025, 0.035);
  if (band2 < res.x) res = vec2(band2, 1.0);
  float band3 = sdGoldBand(p, 0.35, 1.25, 0.025, 0.035);
  if (band3 < res.x) res = vec2(band3, 1.0);

  // Neck bands
  float band4 = sdGoldBand(p, 1.55, 0.44, 0.02, 0.03);
  if (band4 < res.x) res = vec2(band4, 1.0);
  float band5 = sdGoldBand(p, 1.75, 0.42, 0.02, 0.03);
  if (band5 < res.x) res = vec2(band5, 1.0);

  // Lip gold rim
  float lip_rim = sdTorus(p - vec3(0, 2.76, 0), vec2(0.64, 0.025));
  if (lip_rim < res.x) res = vec2(lip_rim, 1.0);

  // Filigree on belly
  float filigree = sdFiligree(p, 0.12, 1.27, 16);
  if (filigree < res.x) res = vec2(filigree, 1.0);

  // Leaf motifs below belly
  float leaves = sdLeaf(p, -0.6, 1.05, 12);
  if (leaves < res.x) res = vec2(leaves, 1.0);

  // Leaves above belly
  float leaves2 = sdLeaf(p, 0.8, 1.0, 12);
  if (leaves2 < res.x) res = vec2(leaves2, 1.0);

  // Bead ring at neck
  float beads = sdBeadRing(p, 1.65, 0.43, 28);
  if (beads < res.x) res = vec2(beads, 1.0);

  // Bead ring at base
  float beads2 = sdBeadRing(p, -1.43, 0.65, 24);
  if (beads2 < res.x) res = vec2(beads2, 1.0);

  // Gold meander band on lower body
  float meander = sdMeanderBand(p, -0.9, 0.85);
  if (meander < res.x) res = vec2(meander, 1.0);

  // Floor
  float floor_d = p.y + 3.0;
  if (floor_d < res.x) res = vec2(floor_d, 2.0);

  return res;
}

// ── Ray march ──
vec2 rayMarch(vec3 ro, vec3 rd) {
  float t = 0.0;
  float matId = -1.0;
  for (int i = 0; i < MAX_STEPS; i++) {
    vec3 p = ro + rd * t;
    vec2 d = mapScene(p);
    if (d.x < SURF_DIST) { matId = d.y; break; }
    t += d.x * 0.8; // slightly conservative for detail
    if (t > MAX_DIST) break;
  }
  return vec2(t, matId);
}

// ── Normal ──
vec3 getNormal(vec3 p) {
  vec2 e = vec2(0.0005, 0.0);
  return normalize(vec3(
    mapScene(p + e.xyy).x - mapScene(p - e.xyy).x,
    mapScene(p + e.yxy).x - mapScene(p - e.yxy).x,
    mapScene(p + e.yyx).x - mapScene(p - e.yyx).x
  ));
}

// ── Soft shadow ──
float softShadow(vec3 ro, vec3 rd, float mint, float maxt, float k) {
  float res = 1.0;
  float t = mint;
  for (int i = 0; i < 64; i++) {
    float d = mapScene(ro + rd * t).x;
    res = min(res, k * d / t);
    t += clamp(d, 0.005, 0.2);
    if (d < 0.001 || t > maxt) break;
  }
  return clamp(res, 0.0, 1.0);
}

// ── Ambient occlusion ──
float calcAO(vec3 p, vec3 n) {
  float occ = 0.0;
  float sca = 1.0;
  for (int i = 0; i < 5; i++) {
    float h = 0.01 + 0.12 * float(i) / 4.0;
    float d = mapScene(p + n * h).x;
    occ += (h - d) * sca;
    sca *= 0.95;
  }
  return clamp(1.0 - 3.0 * occ, 0.0, 1.0);
}

// ═══════════════════════════════════════════════════════════
// GOLD MATERIAL — from physics
//
// Gold reflects >95% for λ > 600nm (red, orange, yellow)
// Strong absorption for λ < 520nm (blue, green absorbed)
// This gives the characteristic warm golden color.
//
// Fresnel: F₀ ≈ 0.95 (highly metallic)
// The Schlick approximation with gold's complex refractive index
// n = 0.18, k = 3.0 at 550nm gives F₀ ≈ 0.95
//
// Color: RGB ≈ (1.0, 0.76, 0.33) for polished gold
// ═══════════════════════════════════════════════════════════

vec3 goldColor(vec3 n, vec3 v, vec3 l, vec3 h) {
  // Gold base reflectance (from Fresnel at normal incidence)
  vec3 F0 = vec3(1.0, 0.76, 0.33);

  // Schlick Fresnel
  float VdotH = max(dot(v, h), 0.0);
  vec3 F = F0 + (1.0 - F0) * pow(1.0 - VdotH, 5.0);

  // GGX microfacet (roughness from texture module: α ≈ 0.15 for polished)
  float alpha = 0.08;
  float NdotH = max(dot(n, h), 0.0);
  float a2 = alpha * alpha;
  float denom = NdotH * NdotH * (a2 - 1.0) + 1.0;
  float D = a2 / (PI * denom * denom);

  // Smith geometry term
  float NdotV = max(dot(n, v), 0.0);
  float NdotL = max(dot(n, l), 0.0);
  float k = (alpha + 1.0) * (alpha + 1.0) / 8.0;
  float G1v = NdotV / (NdotV * (1.0 - k) + k);
  float G1l = NdotL / (NdotL * (1.0 - k) + k);
  float G = G1v * G1l;

  // Cook-Torrance specular
  vec3 spec = F * D * G / max(4.0 * NdotV * NdotL, 0.001);

  return spec * NdotL;
}

// ── Porcelain / ceramic material ──
vec3 ceramicColor(vec3 p, vec3 n, vec3 v, vec3 l) {
  float NdotL = max(dot(n, l), 0.0);

  // Deep cobalt blue with subtle variation
  float angle = atan(p.z, p.x);
  float y = p.y;
  float pattern = 0.5 + 0.5 * sin(angle * 6.0 + y * 4.0) * sin(y * 8.0 - angle * 3.0);
  pattern = smoothstep(0.3, 0.7, pattern);

  vec3 baseColor = mix(
    vec3(0.02, 0.04, 0.18),  // deep blue
    vec3(0.03, 0.06, 0.22),  // slightly lighter blue
    pattern
  );

  // Subsurface-like diffuse (ceramic has depth)
  vec3 diffuse = baseColor * (NdotL * 0.7 + 0.3);

  // Ceramic glaze specular (clear coat over pigment)
  vec3 h = normalize(l + v);
  float NdotH = max(dot(n, h), 0.0);
  float spec = pow(NdotH, 120.0) * 0.6; // tight, bright highlight
  vec3 specColor = vec3(1.0, 0.98, 0.95) * spec;

  // Fresnel for glaze
  float fresnel = pow(1.0 - max(dot(n, v), 0.0), 4.0);
  vec3 rim = vec3(0.05, 0.07, 0.15) * fresnel;

  return diffuse + specColor + rim;
}

// ── Floor material ──
vec3 floorColor(vec3 p, vec3 n, vec3 l) {
  float NdotL = max(dot(n, l), 0.0);

  // Dark marble-like pattern
  float marble = sin(p.x * 3.0 + sin(p.z * 2.0 + p.x) * 2.0) * 0.5 + 0.5;
  marble = smoothstep(0.3, 0.7, marble);

  vec3 col = mix(
    vec3(0.03, 0.025, 0.02),
    vec3(0.06, 0.05, 0.04),
    marble
  );

  return col * (NdotL * 0.6 + 0.15);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / u_res.y;

  // ── Camera ──
  float camAngle = u_time * 0.15 + u_mouse.x * 3.0;
  float camHeight = 0.8 + u_mouse.y * 2.0;
  float camDist = 7.0;

  vec3 ro = vec3(sin(camAngle) * camDist, camHeight, cos(camAngle) * camDist);
  vec3 target = vec3(0.0, 0.0, 0.0);
  vec3 forward = normalize(target - ro);
  vec3 right = normalize(cross(forward, vec3(0, 1, 0)));
  vec3 up = cross(right, forward);
  vec3 rd = normalize(forward + uv.x * right + uv.y * up);

  // ── Light ──
  // Wien's displacement: T=3200K → λ_peak = 905nm (warm incandescent)
  // Color temperature 3200K → RGB ≈ (1.0, 0.82, 0.62)
  //
  // NON-OBSERVER VIEWPOINT: light is fixed in world space.
  //   The photons were already there before you looked.
  //   Moving the camera changes YOUR perspective, not the physics.
  //   The quarks are undisturbed.
  //
  // OBSERVER MODE: light travels with camera (traditional CG).
  //   You brought a flashlight. You are part of the system.
  //   The measurement apparatus affects the result.
  //
  vec3 lightFixed = vec3(4.0, 4.0, 6.0);  // world-space light (non-observer)
  vec3 lightAttached = ro + right * 2.0 + up * 3.0 + forward * 1.0;  // camera-attached
  vec3 lightPos = mix(lightFixed, lightAttached, u_observer);
  vec3 lightColor = vec3(1.0, 0.82, 0.62) * 2.5;

  // Secondary fill light (always fixed — ambient illumination)
  vec3 light2Pos = vec3(-3.0, 5.0, -2.0);
  vec3 light2Color = vec3(0.4, 0.5, 0.7) * 0.5;

  // ── March ──
  vec2 hit = rayMarch(ro, rd);
  float t = hit.x;
  float matId = hit.y;

  vec3 col = vec3(0.0);

  if (t < MAX_DIST) {
    vec3 p = ro + rd * t;
    vec3 n = getNormal(p);
    vec3 v = normalize(ro - p);

    // Main light
    vec3 l1 = normalize(lightPos - p);
    vec3 h1 = normalize(l1 + v);
    float shadow1 = softShadow(p + n * 0.002, l1, 0.02, length(lightPos - p), 16.0);
    float ao = calcAO(p, n);

    // Fill light
    vec3 l2 = normalize(light2Pos - p);
    float shadow2 = softShadow(p + n * 0.002, l2, 0.02, length(light2Pos - p), 8.0);

    if (matId < 0.5) {
      // Ceramic body
      vec3 c1 = ceramicColor(p, n, v, l1) * lightColor * shadow1;
      vec3 c2 = ceramicColor(p, n, v, l2) * light2Color * shadow2;
      col = (c1 + c2) * ao;
    } else if (matId < 1.5) {
      // Gold decorations
      vec3 g1 = goldColor(n, v, l1, h1) * lightColor * shadow1;
      vec3 h2 = normalize(l2 + v);
      vec3 g2 = goldColor(n, v, l2, h2) * light2Color * shadow2;

      // Add diffuse gold component (for body of reflection)
      float NdotL1 = max(dot(n, l1), 0.0);
      float NdotL2 = max(dot(n, l2), 0.0);
      vec3 goldDiff = vec3(0.85, 0.55, 0.1) * (NdotL1 * shadow1 * 0.3 + NdotL2 * shadow2 * 0.1);

      col = (g1 + g2 + goldDiff) * ao;

      // Gold environment reflection (fake)
      vec3 refl = reflect(-v, n);
      float envRefl = smoothstep(-0.2, 0.8, refl.y);
      col += vec3(0.4, 0.3, 0.15) * envRefl * 0.15;
    } else {
      // Floor / pedestal
      vec3 f1 = floorColor(p, n, l1) * lightColor * shadow1;
      vec3 f2 = floorColor(p, n, l2) * light2Color * shadow2;
      col = (f1 + f2) * ao;

      // Floor reflection of gold vase (subtle)
      if (p.y < -2.9) {
        vec3 reflDir = reflect(rd, n);
        vec2 reflHit = rayMarch(p + n * 0.01, reflDir);
        if (reflHit.x < 15.0 && reflHit.y < 1.5) {
          vec3 rp = p + n * 0.01 + reflDir * reflHit.x;
          vec3 rn = getNormal(rp);
          vec3 rv = normalize(ro - rp);
          vec3 rl = normalize(lightPos - rp);
          vec3 rh = normalize(rl + rv);
          vec3 reflCol = reflHit.y < 0.5 ?
            ceramicColor(rp, rn, rv, rl) * lightColor * 0.5 :
            goldColor(rn, rv, rl, rh) * lightColor * 0.7;
          col += reflCol * 0.12;
        }
      }
    }

    // Atmospheric fog
    float fog = 1.0 - exp(-t * t * 0.003);
    col = mix(col, vec3(0.01, 0.008, 0.015), fog);

  } else {
    // Background gradient
    col = vec3(0.01, 0.008, 0.015) * (1.0 - rd.y * 0.5);
  }

  // ── Post-processing ──
  // Tone mapping (ACES-ish)
  col = col * (2.51 * col + 0.03) / (col * (2.43 * col + 0.59) + 0.14);

  // Vignette
  vec2 vuv = gl_FragCoord.xy / u_res;
  float vig = 1.0 - 0.4 * length((vuv - 0.5) * vec2(1.0, u_res.y/u_res.x));
  col *= vig;

  // Gamma
  col = pow(col, vec3(1.0 / 2.2));

  gl_FragColor = vec4(col, 1.0);
}
`;

// ── Compile shaders ──
function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = createShader(gl.VERTEX_SHADER, vsrc);
const fs = createShader(gl.FRAGMENT_SHADER, fsrc);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);

// ── Full-screen quad ──
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');
const uObserver = gl.getUniformLocation(prog, 'u_observer');

// ── Camera mode ──
// NON-OBSERVER VIEWPOINT: light fixed in world space, camera orbits freely.
// The photons don't know you moved. The quarks are undisturbed.
// OBSERVER MODE: light attached to camera (traditional 3D). You are part of the system.
let observerMode = 0; // 0 = non-observer (default), 1 = observer
function toggleCameraMode() {
  observerMode = 1 - observerMode;
  document.getElementById('mode-text').textContent =
    observerMode ? 'OBSERVER (DISTURBS QUARKS)' : 'NON-OBSERVER VIEWPOINT';
  document.getElementById('camera-mode').style.borderColor =
    observerMode ? 'rgba(255,80,80,0.5)' : 'rgba(255,200,80,0.3)';
}

// ── Mouse / touch ──
let mx = 0.5, my = 0.3;
canvas.addEventListener('mousemove', e => {
  mx = e.clientX / window.innerWidth;
  my = 1.0 - e.clientY / window.innerHeight;
});
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mx = t.clientX / window.innerWidth;
  my = 1.0 - t.clientY / window.innerHeight;
  e.preventDefault();
}, { passive: false });

// ── Render loop ──
const start = performance.now();
function frame() {
  const t = (performance.now() - start) / 1000.0;
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mx, my);
  gl.uniform1f(uObserver, observerMode);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
